<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="color-scheme" content="dark light" />

		<title>findur.link — Domain Name Search</title>
		<meta name="description" content="Bulk domain name search with smart mutations. Drop vowels, add suffixes, domain hacks — find the perfect short domain." />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://findur.link/" />
		<meta property="og:title" content="findur.link — Domain Name Search" />
		<meta property="og:description" content="Bulk domain search with 13 mutation types across 470+ TLDs. Drop vowels, add suffixes, domain hacks — find the perfect short domain." />
		<meta property="og:image" content="https://findur.link/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:site_name" content="findur.link" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="findur.link — Domain Name Search" />
		<meta name="twitter:description" content="Bulk domain search with 13 mutation types across 470+ TLDs. Drop vowels, add suffixes, domain hacks — find the perfect short domain." />
		<meta name="twitter:image" content="https://findur.link/og-image.png" />

		<!-- oEmbed discovery -->
		<link rel="alternate" type="application/json+oembed" href="https://findur.link/oembed.json" title="findur.link" />

		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
