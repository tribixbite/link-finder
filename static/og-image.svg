<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#222" stroke-width="2"/>
  <!-- Logo icon (link chain + search) centered above text -->
  <g transform="translate(460, 80) scale(2.2)">
    <rect x="14" y="42" width="52" height="44" rx="22" fill="none" stroke="url(#g1)" stroke-width="8"/>
    <rect x="50" y="42" width="52" height="44" rx="22" fill="none" stroke="url(#g2)" stroke-width="8"/>
    <circle cx="90" cy="88" r="18" fill="none" stroke="#fff" stroke-width="4" opacity="0.85"/>
    <line x1="103" y1="101" x2="118" y2="116" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <circle cx="90" cy="88" r="4" fill="#22d3ee" opacity="0.7"/>
  </g>
  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" fill="#22d3ee" font-family="ui-monospace, monospace" font-size="72" font-weight="bold">findur<tspan fill="#666">.link</tspan></text>
  <!-- Subtitle -->
  <text x="600" y="440" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="32">Bulk domain name search with smart mutations</text>
  <!-- Feature pills -->
  <g transform="translate(600, 500)" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18">
    <rect x="-440" y="-20" width="140" height="36" rx="18" fill="#22d3ee" opacity="0.15"/>
    <text x="-370" y="4" fill="#22d3ee">13 mutations</text>
    <rect x="-260" y="-20" width="140" height="36" rx="18" fill="#22d3ee" opacity="0.15"/>
    <text x="-190" y="4" fill="#22d3ee">470+ TLDs</text>
    <rect x="-80" y="-20" width="160" height="36" rx="18" fill="#22d3ee" opacity="0.15"/>
    <text x="0" y="4" fill="#22d3ee">domain hacks</text>
    <rect x="120" y="-20" width="150" height="36" rx="18" fill="#22d3ee" opacity="0.15"/>
    <text x="195" y="4" fill="#22d3ee">bulk search</text>
    <rect x="310" y="-20" width="130" height="36" rx="18" fill="#22d3ee" opacity="0.15"/>
    <text x="375" y="4" fill="#22d3ee">free &amp; open</text>
  </g>
</svg>
