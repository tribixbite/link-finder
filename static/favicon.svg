<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
  </defs>
  <!-- Link chain left ring -->
  <rect x="14" y="42" width="52" height="44" rx="22" fill="none" stroke="url(#g1)" stroke-width="8"/>
  <!-- Link chain right ring -->
  <rect x="50" y="42" width="52" height="44" rx="22" fill="none" stroke="url(#g2)" stroke-width="8"/>
  <!-- Overlap region fill to show interlock -->
  <rect x="50" y="42" width="16" height="44" rx="8" fill="none" stroke="url(#g1)" stroke-width="8" opacity="0"/>
  <!-- Search lens overlay (bottom-right) -->
  <circle cx="90" cy="88" r="18" fill="none" stroke="#fff" stroke-width="4" opacity="0.85"/>
  <line x1="103" y1="101" x2="118" y2="116" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <!-- Dot inside lens -->
  <circle cx="90" cy="88" r="4" fill="#22d3ee" opacity="0.7"/>
</svg>
